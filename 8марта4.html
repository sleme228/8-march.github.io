<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для 1ИСО группы ✨</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

:root {
--primary:#ff1493;
--secondary:#ff85a2;
--accent:#7b2ff7;
--glass:rgba(255,255,255,0.15);
}

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
font-family:'Montserrat',sans-serif;
background:#0a0a1a;
color:white;
overflow:hidden;
}

/* фон */

.bg-glow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 50% 50%,#1a0033 0%,#050505 100%);
z-index:-1;
}

.blob{
position:absolute;
width:500px;
height:500px;
background:var(--primary);
filter:blur(100px);
border-radius:50%;
opacity:.3;
pointer-events:none;
}

/* страницы */

.page{
display:none;
width:100%;
height:100vh;
position:absolute;
top:0;
left:0;
flex-direction:column;
align-items:center;
justify-content:center;
}

.active{
display:flex;
}

/* карточки */

.glass-card{
background:var(--glass);
backdrop-filter:blur(20px);
padding:40px 60px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.2);
text-align:center;
max-width:600px;
width:90%;
box-shadow:0 25px 50px rgba(0,0,0,0.6);
z-index:10;
}

h1{
font-size:3rem;
margin-bottom:20px;
text-shadow:0 0 15px var(--primary);
}

.btn-main{
padding:20px 60px;
font-size:1.4rem;
font-weight:bold;
border:none;
border-radius:50px;
background:linear-gradient(45deg,var(--primary),var(--accent));
color:white;
cursor:pointer;
transition:.3s;
box-shadow:0 0 20px var(--primary);
}

.btn-main:hover{
transform:scale(1.1);
box-shadow:0 0 40px var(--primary);
}

#catch-btn{
position:absolute;
z-index:100;
max-width:80vw;
}

.score-text{
font-size:2rem;
color:var(--secondary);
margin-bottom:20px;
}

.flower-target{
position:absolute;
font-size:60px;
cursor:pointer;
user-select:none;
}

.trail{
position:absolute;
width:12px;
height:12px;
background:var(--secondary);
border-radius:50%;
pointer-events:none;
}

#flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:1000;
}

/* ===== MOBILE ===== */

@media(max-width:768px){

body,html{
overflow-x:hidden;
}

.glass-card{
padding:25px 20px;
border-radius:25px;
}

h1{
font-size:1.8rem;
line-height:1.3;
}

h2{
font-size:2rem;
}

p{
font-size:1rem !important;
}

.btn-main{
padding:14px 28px;
font-size:1rem;
width:100%;
max-width:260px;
}

.score-text{
font-size:1.4rem;
text-align:center;
padding:10px;
}

.flower-target{
font-size:42px;
}

#p1-title{
font-size:1.8rem;
}

#game-container{
height:70%;
}

.blob{
width:250px;
height:250px;
filter:blur(70px);
}

}

</style>
</head>

<body>

<div id="flash"></div>

<div class="bg-glow">
<div class="blob" id="blob1"></div>
<div class="blob" id="blob2"></div>
</div>

<!-- страница 1 -->

<div id="p0" class="page active">

<div class="glass-card">
<h1>Это дорогим девочкам<br>из <span style="color:var(--secondary)">1ИСО группы</span>! ❤️</h1>
<button class="btn-main" onclick="nextPage(1)">Открыть сюрприз 🎁</button>
</div>

</div>

<!-- страница 2 -->

<div id="p1" class="page">

<h1 id="p1-title" style="text-align:center;padding:20px">
Это ваш день — 8 Марта! 🌸
</h1>

<button id="catch-btn" class="btn-main">
Нажми на меня ✨
</button>

</div>

<!-- страница 3 -->

<div id="p2" class="page">

<div class="glass-card">

<h2 style="font-size:3rem;margin:0">
С праздником! 🌷
</h2>

<p style="font-size:1.6rem;line-height:1.6">
Вы самые талантливые, яркие и чудесные.<br>
Пусть весна вдохновляет на новые победы!
</p>

<button class="btn-main" onclick="nextPage(3)">
Мини-игра 🎮
</button>

</div>

</div>

<!-- игра -->

<div id="p3" class="page">

<div class="score-text">
Поймай 10 цветов:
<span id="score">0</span>
</div>

<div id="game-container" style="width:100%;height:80%"></div>

</div>

<!-- финал -->

<div id="p4" class="page">

<div class="glass-card" style="border-color:gold">

<h1 style="color:gold">
ВЫ ЛУЧШИЕ! ✨
</h1>

<p style="font-size:1.4rem">
Пусть этот день будет полон радости и цветов!
</p>

<p style="font-size:1rem;opacity:.7">
(Все цветы теперь ваши!)
</p>

</div>

</div>

<script>

/* фон */

gsap.to("#blob1",{x:'70vw',y:'30vh',duration:8,repeat:-1,yoyo:true,ease:"sine.inOut"})
gsap.to("#blob2",{x:'-10vw',y:'60vh',duration:12,repeat:-1,yoyo:true,ease:"sine.inOut"})

/* след мыши */

window.addEventListener('mousemove',(e)=>{
const t=document.createElement('div')
t.className='trail'
t.style.left=e.pageX+'px'
t.style.top=e.pageY+'px'
document.body.appendChild(t)

gsap.to(t,{
scale:0,
opacity:0,
duration:.7,
onComplete:()=>t.remove()
})

})

/* страницы */

function nextPage(num){

const flash=document.getElementById('flash')

gsap.to(flash,{
opacity:1,
duration:.2,
onComplete:()=>{

document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.getElementById('p'+num).classList.add('active')

gsap.to(flash,{opacity:0,duration:.4})

if(num===2)startHeartRain()
if(num===3)startGame()
if(num===4)createFinalMountain()

}

})

}

/* кнопка */

let jumps=0
const catchBtn=document.getElementById('catch-btn')

catchBtn.addEventListener('click',()=>{

jumps++

if(jumps<6){

const x=Math.random()*(window.innerWidth-catchBtn.offsetWidth)
const y=Math.random()*(window.innerHeight-catchBtn.offsetHeight)

gsap.to(catchBtn,{
left:x,
top:y,
duration:.15,
scaleX:1.3,
scaleY:.7,
onComplete:()=>gsap.to(catchBtn,{scaleX:1,scaleY:1,duration:.2})
})

if(jumps===1){
document.getElementById('p1-title').innerText="Ой! Попробуй поймай! 🤭"
}

}else{

nextPage(2)

}

})

/* игра */

let score=0
let gameActive=false

function startGame(){

score=0
gameActive=true
document.getElementById('score').innerText=score
gameLoop()

}

function gameLoop(){

if(!gameActive||score>=10)return

createFlower()

setTimeout(gameLoop,Math.max(600,1000-score*50))

}

function createFlower(){

const f=document.createElement('div')

f.className='flower-target'

f.innerText=['🌸','🌹','🌷','🌺','🌻'][Math.floor(Math.random()*5)]

f.style.left=Math.random()*85+'vw'
f.style.top='-100px'

document.getElementById('game-container').appendChild(f)

const anim=gsap.to(f,{
y:window.innerHeight+100,
rotation:360,
duration:3.5-(score*0.1),
ease:"none",
onComplete:()=>{

if(f.parentNode&&gameActive){

gameActive=false
alert("Повезёт в другой раз! 🌸 Попробуй еще раз.")
location.reload()

}

f.remove()

}

})

f.onclick=()=>{

score++

document.getElementById('score').innerText=score

burstEffect(f.offsetLeft,f.offsetTop)

f.remove()

anim.kill()

if(score>=10){

gameActive=false
nextPage(4)

}

}

}

/* эффект */

function burstEffect(x,y){

for(let i=0;i<10;i++){

const p=document.createElement('div')

p.innerText='✨'

p.style.position='absolute'
p.style.left=x+'px'
p.style.top=y+'px'
p.style.pointerEvents='none'

document.body.appendChild(p)

gsap.to(p,{
x:(Math.random()-0.5)*300,
y:(Math.random()-0.5)*300,
opacity:0,
duration:.8,
onComplete:()=>p.remove()
})

}

}

/* финал */

function createFinalMountain(){

for(let i=0;i<200;i++){

setTimeout(()=>{

const f=document.createElement('div')

f.style.position='absolute'

f.innerText=['🌸','🌹','🌷','💖','💐'][Math.floor(Math.random()*5)]

f.style.left=Math.random()*100+'vw'
f.style.fontSize=Math.random()*20+30+'px'
f.style.top='-50px'
f.style.pointerEvents='none'

document.getElementById('p4').appendChild(f)

gsap.to(f,{
y:window.innerHeight-(Math.random()*70)-20,
rotation:Math.random()*720,
duration:2,
ease:"bounce.out"
})

},i*30)

}

}

/* сердца */

function startHeartRain(){

const rainInterval=setInterval(()=>{

if(!document.getElementById('p2').classList.contains('active')){
clearInterval(rainInterval)
return
}

const h=document.createElement('div')

h.innerText='❤️'

h.style.position='absolute'
h.style.left=Math.random()*100+'vw'
h.style.top='-20px'
h.style.opacity=Math.random()

document.getElementById('p2').appendChild(h)

gsap.to(h,{
y:window.innerHeight+50,
duration:4,
onComplete:()=>h.remove()
})

},300)

}

</script>

</body>
</html>
